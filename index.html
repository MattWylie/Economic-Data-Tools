<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Economic Data Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #e6edf3;
      min-height: 100vh;
      padding: 60px 20px;

      /* Layered background: dark base + soft radial glow + dot grid */
      background-color: #0d1117;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(88, 166, 255, 0.08) 0%, transparent 70%),
        radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      font-size: 1rem;
      color: #8b949e;
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 36px 32px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: block;
      backdrop-filter: blur(6px);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(88, 166, 255, 0.5);
      box-shadow: 0 8px 32px rgba(88, 166, 255, 0.1);
    }

    .card:hover h2 {
      color: #58a6ff;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e6edf3;
      transition: color 0.2s;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: #484f58;
      font-size: 0.85rem;
    }

    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>Economic Data Tools</h1>
    <p>Matt Bursnell</p>
  </header>

  <div class="grid">

    <a class="card" href="africa-health-spending.html">
      <h2>Sub-Saharan Africa Healthcare Spending</h2>
    </a>

    <!-- Add more app cards here as you build them -->

  </div>

  <footer>
    <p>Built with Claude Code · <a href="https://github.com/MattWylie/Econ-apps">GitHub</a></p>
  </footer>

</body>
</html>
